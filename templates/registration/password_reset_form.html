{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card cc-card p-4 shadow">

                <div class="text-center mb-4">
                    <i class="bi bi-key display-4 text-warning"></i>
                    <h3 class="fw-bold mt-2">Reset Password</h3>
                    <p class="text-muted small">
                        Enter your email address and we will send you a reset link.
                    </p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_email" class="form-label fw-semibold">Email Address</label>
                        <input type="email"
                               name="email"
                               id="id_email"
                               class="form-control"
                               placeholder="your@email.com"
                               required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-warning fw-semibold">
                            <i class="bi bi-send me-2"></i>Send Reset Link
                        </button>
                    </div>
                </form>

                <div class="text-center mt-3">
                    <a href="{% url 'login' %}" class="text-decoration-none small">
                        <i class="bi bi-arrow-left me-1"></i>Back to Login
                    </a>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock content %}
